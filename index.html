<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .balance-card { background: linear-gradient(135deg, #ffd700, #ffaa00); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .ad-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <h3>الرصيد الإجمالي</h3>
        <h1>$0.00</h1>
    </div>

    <div class="ad-card">
        <h3>شاهد واكسب</h3>
        <p>أكمل وشاهد إعلان فيديو قصير واكسب $0.20</p>
        <button id="showAdBtn">مشاهدة الإعلان</button>
    </div>

    <script src="https://sad.adsgram.ai/js/adgram.min.js"></script>
    <script>
        const adController = window.Adsgram.init({ blockId: "bot-35929" });
        const btn = document.getElementById("showAdBtn");

        btn.addEventListener("click", () => {
            adController.show().catch((err) => {
                alert("خطأ في عرض الإعلان: " + err);
            });
        });
    </script>
</body>
</html>
